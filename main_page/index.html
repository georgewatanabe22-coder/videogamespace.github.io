<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CISGAME-420 Final Group Project</title>
    <link rel="shortcut icon" href="images/team-favicon.png" />
    <style>
        canvas {
            box-shadow: black 20px 10px 50px;
        }

        h1 {
            margin: 0px;
            margin-bottom: 10px;
            font-size: 2.9em;
            font-family: "Helvetica";
        }

        body {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-direction: column;
            text-align: center;
            padding: 0px;
            margin: 0px;
            min-height: 100vh;
            background-image: url("images/background-pattern.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: Helvetica, Arial, sans-serif;
        }

        

.banner {
    width: 950px;
    max-width: 95%;
    height: auto;
    display: block;
    margin: 20px auto 10px auto;
    border-radius: 12px;
}

nav {
    margin-top: 10px;
    font-size: 1.5em;
    font-weight: bold;
}

nav a {
    color: #b86cff;
    text-decoration: none;
    margin: 0 15px;
    transition: 0.3s;
}

#music-btn {
    margin-top: 25px;
    padding: 10px 22px;
    font-size: 1em;
    font-weight: bold;
    background: linear-gradient(90deg, #7b2cff, #00d9ff);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 15px rgba(0,217,255,0.5);
    transition: 0.3s;
}

#music-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0,217,255,0.8);
}
        
nav a:hover {
    color: #00d9ff;
    text-shadow: 0 0 10px #00d9ff;
}
        
    </style>
</head>
<body>
    <header>
    <img src="images/banner-main.png" alt="CISGAME 420 Team 1 Game Portfolio" class="banner">
</header>
    <nav>
        <a href="../sean's_folder/sv_cisgame_sean_page.html">Sean's Project</a> &nbsp; 
        <a href="../george's_folder/index.html">George's Project</a> &nbsp;
        <a href="../cameron/index.html">Cameron's Project</a> &nbsp; 
        <a href="../"></a> &nbsp;
    </nav>
    <audio id="bg-audio" loop>
        <source src="cisgame420_arcade_loop.mp3" type="audio/mpeg">
    </audio>
    
    <button id="music-btn">▶ Play Background Music</button>

<script>
const audio = document.getElementById('bg-audio');
const musicButton = document.getElementById('music-btn');

musicButton.addEventListener('click', () => {
    if (audio.paused) {
        audio.play();
        musicButton.textContent = '♫ Pause Music';
    } else {
        audio.pause();
        musicButton.textContent = '▶ Play Background Music';
    }
});
</script>

    <h1>Space Invaders</h1>

    <script type="module" src="index.js"></script>
    -->
</body>
</html>
